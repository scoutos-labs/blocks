name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Tests
        run: npm test
      - name: Validate root workflows
        run: |
          for f in workflows/*.workflow.json; do
            cli/bin/blocks validate "$f" || exit 1
          done
      - name: Static triage plan
        run: cli/bin/blocks plan workflows/triage-bug-report.workflow.json
      - name: Audit current curated examples
        run: |
          for f in examples/runs/current/*.run.json; do
            cli/bin/blocks audit "$f" || exit 1
          done
      - name: Protocol consistency and generated HTML
        run: npm run check:protocol
